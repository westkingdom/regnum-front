<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <style>
        body {
            margin: 0;
            padding: 4px 0;
            background: transparent;
            font-family: sans-serif;
        }
        #recaptcha-container {
            display: inline-block;
        }
        #status {
            font-size: 13px;
            color: #666;
            padding: 4px 0;
        }
    </style>
</head>
<body>
    <div id="recaptcha-container"></div>
    <div id="status"></div>

    <!-- reCAPTCHA Enterprise API: explicit render mode -->
    <script src="https://www.google.com/recaptcha/enterprise.js?onload=onRecaptchaApiReady&render=explicit" async defer></script>

    <script>
        // ---------------------------------------------------------------------------
        // Minimal Streamlit component protocol (no external library dependency).
        // ---------------------------------------------------------------------------
        var componentArgs = null;
        var apiReady = false;
        var widgetRendered = false;

        function sendToStreamlit(type, payload) {
            var msg = Object.assign({ isStreamlitMessage: true, type: type }, payload);
            window.parent.postMessage(msg, "*");
        }

        function setComponentReady() {
            sendToStreamlit("streamlit:componentReady", { apiVersion: 1 });
        }

        function setComponentValue(value) {
            sendToStreamlit("streamlit:setComponentValue", { value: value, dataType: "json" });
        }

        function setFrameHeight(height) {
            sendToStreamlit("streamlit:setFrameHeight", { height: height });
        }

        // Listen for render events from the parent Streamlit app
        window.addEventListener("message", function (event) {
            if (event.data && event.data.type === "streamlit:render") {
                componentArgs = event.data.args || {};
                tryRender();
            }
        });

        // ---------------------------------------------------------------------------
        // Resize iframe when the reCAPTCHA challenge popup opens/closes.
        // The challenge is rendered as a new iframe injected into the document body.
        // We watch for it with a MutationObserver and resize our frame accordingly.
        // ---------------------------------------------------------------------------
        var CHECKBOX_HEIGHT = 78;
        var CHALLENGE_HEIGHT = 510;  // tall enough for image-grid challenge

        function watchForChallenge() {
            var observer = new MutationObserver(function () {
                // reCAPTCHA injects a second iframe (the challenge popup) into the body
                var frames = document.querySelectorAll('iframe');
                var challengeVisible = false;
                frames.forEach(function (f) {
                    // Challenge iframe titles include "recaptcha challenge"
                    var title = (f.title || '').toLowerCase();
                    if (title.indexOf('challenge') !== -1 && f.offsetParent !== null) {
                        challengeVisible = true;
                    }
                });
                setFrameHeight(challengeVisible ? CHALLENGE_HEIGHT : CHECKBOX_HEIGHT);
            });

            observer.observe(document.body, { childList: true, subtree: true, attributes: true, attributeFilter: ['style'] });
        }

        // ---------------------------------------------------------------------------
        // reCAPTCHA logic
        // ---------------------------------------------------------------------------
        function onRecaptchaApiReady() {
            apiReady = true;
            tryRender();
        }

        function tryRender() {
            if (!apiReady || !componentArgs || widgetRendered) return;
            widgetRendered = true;

            var siteKey = componentArgs.site_key;

            if (!siteKey) {
                document.getElementById("status").innerText = "reCAPTCHA site key not configured.";
                setFrameHeight(30);
                return;
            }

            grecaptcha.enterprise.render("recaptcha-container", {
                "sitekey":          siteKey,
                "callback":         onSuccess,
                "expired-callback": onExpired,
                "error-callback":   onError
            });

            watchForChallenge();
            setFrameHeight(CHECKBOX_HEIGHT);
        }

        function onSuccess(token) {
            document.getElementById("status").innerText = "";
            setComponentValue(token);
            setFrameHeight(CHECKBOX_HEIGHT);
        }

        function onExpired() {
            document.getElementById("status").innerText = "Verification expired. Please try again.";
            grecaptcha.enterprise.reset();
            setComponentValue("");
        }

        function onError() {
            document.getElementById("status").innerText = "reCAPTCHA error. Check your connection.";
            setComponentValue("");
        }

        // Signal ready and set initial height
        setComponentReady();
        setFrameHeight(CHECKBOX_HEIGHT);
    </script>
</body>
</html>
